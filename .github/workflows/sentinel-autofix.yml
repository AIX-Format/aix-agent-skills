name: Schema Sentinel Autofix

# Sibling workflow to `schema-sentinel.yml`. The strict sentinel keeps PRs
# honest by failing on any orphan MD; this workflow runs on a schedule (and
# on pushes to main) to auto-register any orphan that lands on the default
# branch and open a follow-up PR with the registration. This closes the
# loop on the "Schema Sentinel" idea: not only does it detect drift, it
# proposes the fix as a reviewable PR instead of stalling the build.
on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "skills.json"
      - "scripts/schema_sentinel.py"
  schedule:
    # Daily at 06:00 UTC — catches any orphan that slipped in via direct
    # pushes, merges with [skip ci], or out-of-band tooling.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sentinel-autofix
  cancel-in-progress: false

jobs:
  autofix:
    name: Auto-register orphan skills
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          # Use a PAT when available so the resulting PR can trigger
          # downstream workflows (e.g., schema-sentinel.yml). Falls back
          # to GITHUB_TOKEN, which still works but won't re-trigger CI
          # on the autofix branch by design.
          token: ${{ secrets.SENTINEL_PR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run schema sentinel with --fix
        id: sentinel
        # The script returns 0 when orphans are the only failure (after
        # autofix), or non-zero for any other violation. We capture the
        # exit code without short-circuiting so the workflow can still
        # surface real schema errors via the strict sentinel job.
        run: |
          set +e
          python3 scripts/schema_sentinel.py --fix
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Detect manifest changes
        id: diff
        run: |
          if git diff --quiet skills.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SENTINEL_PR_TOKEN || secrets.GITHUB_TOKEN }}
          branch: sentinel/auto-register-orphans-${{ github.run_number }}
          delete-branch: true
          commit-message: |
            sentinel: auto-register ${{ steps.sentinel.outputs.orphan_count || 'orphan' }} skill(s)

            Detected by Schema Sentinel autofix run #${{ github.run_number }}.
            Orphans: ${{ steps.sentinel.outputs.orphans }}
          author: "Iqra Marketplace Bot <bot@iqra.sovereign>"
          committer: "Iqra Marketplace Bot <bot@iqra.sovereign>"
          title: "🛡️ Sentinel: auto-register orphan skill(s)"
          body: |
            The Schema Sentinel detected one or more Markdown files under
            `skills/` that were not registered in `skills.json`. This PR
            adds stub entries so the marketplace manifest matches the
            files on disk and `schema-sentinel.yml` stays green.

            **Orphans registered:** `${{ steps.sentinel.outputs.orphans || '(see diff)' }}`
            **Count:** ${{ steps.sentinel.outputs.orphan_count || 'see diff' }}
            **Triggered by:** `${{ github.event_name }}` (run #${{ github.run_number }})

            Review the `description` field for each new entry, tweak it
            if the auto-extracted heading isn't right, and merge. If an
            orphan was added by mistake, close this PR and delete the MD
            instead.
          labels: |
            auto-fix
            schema-sentinel
