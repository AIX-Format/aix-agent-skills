name: Schema Sentinel Autofix

# Sibling workflow to `schema-sentinel.yml`. The strict sentinel keeps PRs
# honest by failing on any orphan MD; this workflow runs on a schedule (and
# on pushes to main) to auto-register any orphan that lands on the default
# branch.
#
# Behavior (Nov 2026): opens a pull request instead of pushing directly to
# main. Direct push to main from a bot bypasses human review and was the
# root cause of marketplace stub accumulation (see #21 cleanup). The PR
# path adds a human gate and keeps the marketplace honest.
on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "skills.json"
      - "scripts/schema_sentinel.py"
  schedule:
    # Daily at 06:00 UTC — catches any orphan that slipped in via direct
    # pushes, merges with [skip ci], or out-of-band tooling.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sentinel-autofix
  cancel-in-progress: false

jobs:
  autofix:
    name: Open PR for orphan skills
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run schema sentinel with --fix
        id: sentinel
        # The script returns 0 when orphans are the only failure (after
        # autofix), or non-zero for any other violation. We capture the
        # exit code without short-circuiting so the workflow can still
        # surface real schema errors via the strict sentinel job.
        run: |
          set +e
          python3 scripts/schema_sentinel.py --fix
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Re-sign any newly registered orphans
        # Best-effort: if the secret is missing the script will refuse
        # to sign, which is fine. The verify workflow stays advisory.
        env:
          IQRA_WATERMARK_SECRET: ${{ secrets.IQRA_WATERMARK_SECRET }}
        run: |
          set +e
          python3 scripts/watermark.py --sign-all >/dev/null 2>&1
          exit 0

      - name: Detect manifest changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request for autofix
        if: steps.diff.outputs.changed == 'true'
        # peter-evans/create-pull-request handles branch creation, commit,
        # push, and PR open/update in one step. The action is idempotent:
        # rerunning with new orphans updates the existing PR in place.
        # Reviewer ensures we never silently merge low-quality stubs again.
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sentinel-autofix/orphan-skills
          base: main
          commit-message: |
            🛡️ sentinel: auto-register orphan skill(s)

            Detected by Schema Sentinel autofix run #${{ github.run_number }} (${{ github.event_name }}).
          title: "🛡️ sentinel: register orphan skill(s)"
          body: |
            Schema Sentinel found orphan MD files under `skills/` that are
            not registered in `skills.json`. This PR registers them so the
            strict sentinel passes.

            **⚠️ Review carefully before merging.** Auto-generated stubs
            (14-line files with TODOs only) should generally be deleted at
            the source rather than registered. Prefer rejecting this PR
            and cleaning up the orphan MDs if they have no real content.

            Triggered by run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) on event `${{ github.event_name }}`.
          labels: |
            automated
            sentinel
          delete-branch: true
