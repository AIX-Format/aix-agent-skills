name: Marketplace Chronicle

# Monthly auto-generated history of the IQRA marketplace. Aggregates
# skill/persona counts, tier breakdown, and recent activity into a
# single self-updating CHRONICLE.md committed back to main under the
# github-actions[bot] identity (with [skip ci] to prevent recursion).
on:
  schedule:
    # First day of every month at 03:00 UTC.
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: chronicle
  cancel-in-progress: false

jobs:
  generate:
    name: Generate marketplace chronicle
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          # Need a deeper history so --since=30 days ago and the
          # recent-commits section can actually find commits.
          fetch-depth: 200
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate CHRONICLE.md
        id: gen
        run: python3 scripts/chronicle.py

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet CHRONICLE.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHRONICLE.md
          git commit -m "chronicle: monthly marketplace report [skip ci]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin HEAD:main
