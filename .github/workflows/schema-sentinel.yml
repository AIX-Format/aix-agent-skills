name: Schema Sentinel

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "skills.json"
      - "skills/**"
      - "scripts/schema_sentinel.py"
      - ".github/workflows/schema-sentinel.yml"

permissions:
  contents: read

jobs:
  sentinel:
    name: Validate skills manifest
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run schema sentinel
        run: python3 scripts/schema_sentinel.py

      - name: Run skills test suite
        run: |
          python3 -m pip install --quiet pytest
          python3 -m pytest tests/ -q --no-header
